<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roblox Clothing Downloader PRO</title>

<style>
body {
    background: linear-gradient(135deg, #0a0a0a, #1a0000);
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 40px;
}

.container {
    background: #111;
    padding: 30px;
    border-radius: 20px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 0 30px rgba(255,0,0,0.2);
}

h1 {
    color: red;
}

input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
    margin-bottom: 15px;
    background: #222;
    color: white;
}

button {
    padding: 12px 25px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: darkred;
}

img {
    margin-top: 20px;
    max-width: 100%;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(255,0,0,0.3);
}

.info {
    margin-top: 10px;
    color: #aaa;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Roblox Template Downloader</h1>

    <input type="text" id="input" placeholder="Paste ID or URL...">
    <br>
    <button onclick="load()">Get Template</button>

    <div id="result"></div>
</div>

<script>
function getId(text) {
    let match = text.match(/\d+/);
    return match ? match[0] : null;
}

async function load() {
    const input = document.getElementById("input").value;
    const id = getId(input);

    if (!id) {
        alert("Invalid ID");
        return;
    }

    const result = document.getElementById("result");
    result.innerHTML = "Loading...";

    try {
        // TRY REAL TEMPLATE
        const assetUrl = `https://assetdelivery.roblox.com/v1/asset/?id=${id}`;
        
        const response = await fetch(assetUrl);
        const text = await response.text();

        // Extract TextureId from XML
        const match = text.match(/https:\/\/www\.roblox\.com\/asset\/\?id=\d+/);

        if (match) {
            const realId = match[0].match(/\d+/)[0];
            const imgUrl = `https://assetdelivery.roblox.com/v1/asset/?id=${realId}`;

            showResult(imgUrl, "REAL TEMPLATE");
            return;
        }

        throw "No texture found";

    } catch (e) {
        // FALLBACK THUMBNAIL
        const thumb = `https://thumbnails.roblox.com/v1/assets?assetIds=${id}&size=420x420&format=Png`;

        fetch(thumb)
        .then(r => r.json())
        .then(data => {
            const img = data.data[0].imageUrl;
            showResult(img, "Preview only (fallback)");
        });
    }
}

function showResult(url, type) {
    document.getElementById("result").innerHTML = `
        <p>${type}</p>
        <img src="${url}">
        <div class="info">Expected size: 585x559 PNG</div>
        <br>
        <a href="${url}" download>
            <button>Download</button>
        </a>
    `;
}
</script>

</body>
</html>

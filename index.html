<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roblox Downloader FIXED</title>

<style>
body {
    background: #0a0a0a;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 40px;
}

.box {
    background: #111;
    padding: 25px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
}

input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
    background: #222;
    color: white;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: red;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

img {
    margin-top: 20px;
    max-width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Roblox Template Downloader</h2>

    <input id="input" placeholder="ID or URL">
    <br>
    <button onclick="getAsset()">Get</button>

    <div id="result"></div>
</div>

<script>
function getId(text) {
    let match = text.match(/\d+/);
    return match ? match[0] : null;
}

async function getAsset() {
    const id = getId(document.getElementById("input").value);

    if (!id) {
        alert("Invalid ID");
        return;
    }

    const result = document.getElementById("result");
    result.innerHTML = "Loading...";

    try {
        // 🔥 USING PROXY (FIXES CORS)
        const url = `https://thumbnails.roproxy.com/v1/assets?assetIds=${id}&size=420x420&format=Png`;

        const res = await fetch(url);
        const data = await res.json();

        if (!data.data || !data.data[0]) throw "No data";

        const img = data.data[0].imageUrl;

        result.innerHTML = `
            <img src="${img}">
            <br>
            <a href="${img}" download>
                <button>Download</button>
            </a>
        `;

    } catch (err) {
        result.innerHTML = "Error loading asset";
    }
}
</script>

</body>
</html>
